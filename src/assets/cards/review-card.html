<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Review Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: transparent;
    }

    .card {
      width: 1080px;
      height: 1920px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at top center, #1a1a1a 0%, #0d0d0d 60%);
      overflow: hidden;
      border-radius: 48px;
    }

    /* ── Album cover ──────────────────────────────────────── */
    .image-wrap {
      width: 880px;
      height: 880px;
      flex-shrink: 0;
      overflow: hidden;
      margin-top: 100px;
      border-radius: 32px;
    }

    .image-wrap img,
    .image-placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-placeholder {
      background:
        repeating-linear-gradient(0deg, transparent, transparent 59px, #1c1c1c 59px, #1c1c1c 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, #1c1c1c 59px, #1c1c1c 60px),
        #141414;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 24px;
    }

    /* ── Content ──────────────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 0 80px;
      padding-top: 48px;
    }

    .review-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #d32531;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 72px;
      font-weight: 700;
      line-height: 1.05;
      color: #ffffff;
      letter-spacing: -0.02em;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .artist {
      font-family: 'Inter', sans-serif;
      font-size: 48px;
      font-weight: 400;
      color: #777;
      margin-top: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .divider { flex: 1; }

    /* ── Bottom row: QR + Logo ────────────────────────────── */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 80px 80px;
      flex-shrink: 0;
    }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-img {
      width: 180px;
      height: 180px;
      border-radius: 16px;
      background: #fff;
      padding: 10px;
    }

    .qr-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      color: #555;
      letter-spacing: 0.03em;
    }

    .logo-wrap svg {
      width: 280px;
      height: auto;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="image-wrap">
      <div class="image-placeholder">Album cover</div>
    </div>

    <div class="content">
      <div class="review-label">Review:</div>
      <div class="title">Album Title Goes Here</div>
      <div class="artist">Artist Name</div>
      <div class="divider"></div>
    </div>

    <div class="bottom-row">
      <div class="qr-wrap">
        <img src="QR_PLACEHOLDER" alt="QR code" class="qr-img">
        <span class="qr-label">Scan to read</span>
      </div>
      <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 730 95">
          <rect x="0"  y="15" width="101" height="24" fill="white"/>
          <rect x="0"  y="56" width="101" height="24" fill="white"/>
          <text
            x="121" y="80"
            font-family="'JetBrains Mono', 'Courier New', monospace"
            font-weight="700"
            font-size="82"
            fill="white"
          >Equal Rights</text>
        </svg>
      </div>
    </div>

  </div>
</body>
</html>
