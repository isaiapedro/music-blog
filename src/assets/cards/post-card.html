<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Post Card — Equal Rights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 1080px;
      width: 810px;
      overflow: hidden;
      background: #0d0d0d;
    }

    .card {
      height: 1080px;
      width: 810px;
      position: relative;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(
          circle at bottom center,
          #1a1a1a 0%,
          #0d0d0d 25%,
          #0d0d0d 100%
        );
      overflow: hidden;
    }

    /* ── Image area — 40% of card height ─────────────────── */
    .image-wrap {
      position: relative;
      height: 580px;
      width: 810px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .image-wrap img,
    .image-placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-placeholder {
      background:
        linear-gradient(135deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Fade image into background */
    .image-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 300px;
      background: linear-gradient(to bottom, transparent 0%, #0d0d0d 100%);
      pointer-events: none;
    }

    /* ── Content area — remaining 60% ─────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 72px;
      padding-top: 20px;
    }

    .accent-line {
      width: 52px;
      height: 3px;
      background: #d32531;
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .category {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #d32531;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 58px;
      font-weight: 800;
      line-height: 1.08;
      margin-left: -2px;
      color: #ffffff;
      letter-spacing: -0.01em;
      flex-shrink: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Description sits directly below title with small gap */
    .description {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.5;
      color: #777;
      margin-top: 14px;
      flex-shrink: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Spacer — pushes logo down but not flush to description */
    .divider {
      flex: 1;
    }

    /* ── Logo ─────────────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 40px;
      flex-shrink: 0;
    }

    .logo-wrap svg {
      width: 310px;
      height: auto;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="image-wrap">
      <!--
        Replace this div with:
        <img src="your-cover-image.jpg" alt="Post cover">
      -->
      <div class="image-placeholder">Cover image</div>
    </div>

    <div class="content">
      <div class="accent-line"></div>

      <!--
        Optional: uncomment and set the category/tag
        <div class="category">Technology</div>
      -->

      <div class="title">
        This Is Where Your Blog Post Title Goes Here
      </div>

      <div class="divider"></div>

      <div class="logo-wrap">
        <!-- logo-site.svg inlined, bars + text white -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 730 95">
          <rect x="0"  y="15" width="101" height="24" fill="white"/>
          <rect x="0"  y="56" width="101" height="24" fill="white"/>
          <text
            x="121" y="80"
            font-family="'JetBrains Mono', 'Courier New', monospace"
            font-weight="700"
            font-size="82"
            fill="white"
          >Equal Rights</text>
        </svg>
      </div>
    </div>

  </div>
</body>
</html>
